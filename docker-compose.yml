version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        ollama serve &
        echo "Waiting for Ollama to be ready..." &&
        until curl -sf http://localhost:11434/ > /dev/null 2>&1; do
          sleep 2
        done &&
        echo "Ollama is ready. Pulling model..." &&
        ollama pull $${OLLAMA_MODEL:-llama3.1:8b} &&
        wait
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
  chroma_data:
